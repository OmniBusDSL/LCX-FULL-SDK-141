<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Public REST API - Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .header h1 { color: #007acc; margin-bottom: 10px; }
        .header p { color: #888; font-size: 13px; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        .btn:hover { background: #005a9e; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-danger { background: #a31515; }
        .btn-danger:hover { background: #7a0f0f; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-value.ok { color: #4ec9b0; }
        .stat-value.fail { color: #f48771; }
        .stat-value.pending { color: #888; }
        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .endpoint-card {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            transition: all 0.3s;
        }
        .endpoint-card.ok { border-color: #4ec9b0; background: #1e3a35; }
        .endpoint-card.fail { border-color: #f48771; background: #3a1e1e; }
        .endpoint-card.pending { border-color: #666; background: #2a2a2d; }
        .endpoint-method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }
        .method-get { background: #0066cc; }
        .method-post { background: #006600; }
        .endpoint-path {
            font-family: 'Courier New', monospace;
            color: #ce9178;
            margin: 8px 0;
        }
        .endpoint-status { margin-top: 10px; padding-top: 10px; border-top: 1px solid #3c3c3c; font-size: 12px; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-badge.ok { background: #4ec9b0; color: #000; }
        .status-badge.fail { background: #f48771; color: #000; }
        .status-badge.pending { background: #666; color: #fff; }
        .endpoint-error { color: #f48771; font-size: 11px; margin-top: 5px; }
        .endpoint-time { color: #888; font-size: 11px; margin-top: 5px; }
        .nav-links {
            margin-bottom: 20px;
            padding: 15px;
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
        }
        .nav-links a {
            color: #007acc;
            text-decoration: none;
            margin-right: 20px;
            font-size: 13px;
        }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="/all-endpoints">📊 All Endpoints</a>
            <a href="/public" style="color: #4ec9b0; font-weight: bold;">🌍 Public REST</a>
            <a href="/private">🔒 Private REST</a>
            <a href="/websocket">🌐 WebSocket</a>
        </div>

        <div class="header">
            <h1>🌍 Public REST API Test</h1>
            <p>Market data endpoints (no authentication required)</p>
        </div>

        <div class="controls">
            <button class="btn" id="btn-test">▶ Test All</button>
            <button class="btn btn-danger" id="btn-clear">🗑 Clear Results</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✓ Pass</div>
                <div class="stat-value ok" id="stat-ok">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✗ Fail</div>
                <div class="stat-value fail" id="stat-fail">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⏳ Pending</div>
                <div class="stat-value pending" id="stat-pending">0</div>
            </div>
        </div>

        <div style="margin-bottom: 20px; padding: 10px; background: #252526; border-radius: 4px; color: #888; font-size: 12px;">
            Status: <span id="test-status">Ready</span>
        </div>

        <div class="endpoints-grid" id="endpoints-grid"></div>
    </div>

    <script>
        const PUBLIC_ENDPOINTS = [
            // 📈 MARKET API (7)
            { method: 'GET', path: '/api/tickers', category: 'Market', description: 'Get all tickers' },
            { method: 'GET', path: '/api/ticker', category: 'Market', description: 'Get single ticker' },
            { method: 'GET', path: '/api/book', category: 'Market', description: 'Get orderbook' },
            { method: 'GET', path: '/api/trades', category: 'Market', description: 'Get recent trades' },
            { method: 'GET', path: '/v1/market/kline', category: 'Market', description: 'Get candlestick data' },
            { method: 'GET', path: '/api/pairs', category: 'Market', description: 'Get trading pairs' },
            { method: 'GET', path: '/api/pair', category: 'Market', description: 'Get pair details' },
        ];

        let testResults = {};

        document.getElementById('stat-total').textContent = PUBLIC_ENDPOINTS.length;
        document.getElementById('stat-pending').textContent = PUBLIC_ENDPOINTS.length;
        renderEndpoints();

        document.getElementById('btn-test').addEventListener('click', testAll);
        document.getElementById('btn-clear').addEventListener('click', clearResults);

        function renderEndpoints() {
            const grid = document.getElementById('endpoints-grid');
            grid.innerHTML = '';

            PUBLIC_ENDPOINTS.forEach((endpoint, idx) => {
                const result = testResults[idx];
                const card = document.createElement('div');
                card.className = `endpoint-card ${result?.status || 'pending'}`;

                const methodClass = `method-${endpoint.method.toLowerCase()}`;
                const statusBadge = result ?
                    `<span class="status-badge ${result.status}">${result.status === 'ok' ? '✓ PASS' : '✗ FAIL'}</span>` :
                    `<span class="status-badge pending">⏳ Pending</span>`;

                let html = `
                    <div style="margin-bottom: 10px;">
                        <span class="endpoint-method ${methodClass}">${endpoint.method}</span>
                        <span style="color: #888; font-size: 12px;">${endpoint.category}</span>
                    </div>
                    <div class="endpoint-path">${endpoint.path}</div>
                    <div style="color: #888; font-size: 12px;">${endpoint.description}</div>
                    <div class="endpoint-status">${statusBadge}</div>
                `;

                if (result) {
                    html += `<div class="endpoint-time">⏱ ${result.time}ms</div>`;
                    if (result.status === 'fail') {
                        const errorMsg = (result.error || 'Unknown error').toString();
                        html += `<div class="endpoint-error">❌ ${errorMsg}</div>`;
                    } else if (result.sample) {
                        const sampleStr = result.sample.toString().substring(0, 60);
                        html += `<div style="color: #888; font-size: 11px; margin-top: 5px;">📊 Data received</div>`;
                    }
                }

                card.innerHTML = html;
                grid.appendChild(card);
            });
        }

        async function testAll() {
            const btn = document.getElementById('btn-test');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            for (let i = 0; i < PUBLIC_ENDPOINTS.length; i++) {
                const endpoint = PUBLIC_ENDPOINTS[i];
                document.getElementById('test-status').textContent = `Testing ${i + 1}/${PUBLIC_ENDPOINTS.length}... (${endpoint.method} ${endpoint.path})`;
                await testEndpoint(i, endpoint);
                await new Promise(r => setTimeout(r, 2000));
            }

            updateStats();
            renderEndpoints();
            btn.disabled = false;
            btn.textContent = '▶ Test All';
            document.getElementById('test-status').textContent = 'Testing complete!';
        }

        async function testEndpoint(idx, endpoint, retryCount = 0) {
            const maxRetries = 2;
            const startTime = Date.now();

            try {
                console.log(`[${retryCount + 1}] Testing: ${endpoint.method} ${endpoint.path}`);

                const response = await fetch('/test-single-endpoint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint, auth: null })
                });

                const time = Date.now() - startTime;
                const data = await response.json();

                console.log(`[RESPONSE] ${endpoint.path}:`, data);
                console.log(`Status: ${data.status}, Time: ${time}ms, Error: ${data.error || 'none'}`);

                if (data.sample) {
                    console.log(`Sample: ${data.sample.substring(0, 100)}`);
                }

                if (data.status === 'ok') {
                    testResults[idx] = { status: 'ok', time: data.time };
                } else {
                    if (retryCount < maxRetries) {
                        console.log(`Retrying (${retryCount + 1}/${maxRetries})...`);
                        await new Promise(r => setTimeout(r, 1000));
                        return testEndpoint(idx, endpoint, retryCount + 1);
                    }
                    testResults[idx] = { status: 'fail', time: data.time, error: data.error || 'Unknown error' };
                }
            } catch (err) {
                const time = Date.now() - startTime;
                console.error(`Catch error: ${err.message}`);
                if (retryCount < maxRetries) {
                    console.log(`Retrying after error (${retryCount + 1}/${maxRetries})...`);
                    await new Promise(r => setTimeout(r, 1000));
                    return testEndpoint(idx, endpoint, retryCount + 1);
                }
                testResults[idx] = { status: 'fail', time, error: err.message };
            }
        }

        function updateStats() {
            const total = PUBLIC_ENDPOINTS.length;
            const ok = Object.values(testResults).filter(r => r.status === 'ok').length;
            const fail = Object.values(testResults).filter(r => r.status === 'fail').length;
            const pending = total - ok - fail;

            document.getElementById('stat-ok').textContent = ok;
            document.getElementById('stat-fail').textContent = fail;
            document.getElementById('stat-pending').textContent = pending;
        }

        function clearResults() {
            testResults = {};
            document.getElementById('stat-ok').textContent = '0';
            document.getElementById('stat-fail').textContent = '0';
            document.getElementById('stat-pending').textContent = PUBLIC_ENDPOINTS.length;
            document.getElementById('test-status').textContent = 'Ready';
            renderEndpoints();
        }
    </script>
</body>
</html>
