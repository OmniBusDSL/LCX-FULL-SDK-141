<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 WebSocket API - Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .header h1 { color: #9900cc; margin-bottom: 10px; }
        .header p { color: #888; font-size: 13px; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            background: #9900cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        .btn:hover { background: #7700aa; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary { background: #007acc; }
        .btn-secondary:hover { background: #005a9e; }
        .auth-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .auth-box input {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: #d4d4d4;
            padding: 8px;
            border-radius: 3px;
            margin-right: 10px;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 12px;
        }
        .auth-box label {
            color: #888;
            font-size: 12px;
            display: inline-block;
            margin-right: 5px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-value.ok { color: #4ec9b0; }
        .stat-value.fail { color: #f48771; }
        .stat-value.pending { color: #888; }
        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .endpoint-card {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            transition: all 0.3s;
        }
        .endpoint-card.ok { border-color: #4ec9b0; background: #1e3a35; }
        .endpoint-card.fail { border-color: #f48771; background: #3a1e1e; }
        .endpoint-card.pending { border-color: #666; background: #2a2a2d; }
        .endpoint-method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
            background: #9900cc;
        }
        .endpoint-path {
            font-family: 'Courier New', monospace;
            color: #ce9178;
            margin: 8px 0;
        }
        .endpoint-status { margin-top: 10px; padding-top: 10px; border-top: 1px solid #3c3c3c; font-size: 12px; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-badge.ok { background: #4ec9b0; color: #000; }
        .status-badge.fail { background: #f48771; color: #000; }
        .status-badge.pending { background: #666; color: #fff; }
        .endpoint-error { color: #f48771; font-size: 11px; margin-top: 5px; }
        .endpoint-time { color: #888; font-size: 11px; margin-top: 5px; }
        .nav-links {
            margin-bottom: 20px;
            padding: 15px;
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
        }
        .nav-links a {
            color: #007acc;
            text-decoration: none;
            margin-right: 20px;
            font-size: 13px;
        }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="/all-endpoints">📊 All Endpoints</a>
            <a href="/public">🌍 Public REST</a>
            <a href="/private">🔒 Private REST</a>
            <a href="/websocket" style="color: #9900cc; font-weight: bold;">🌐 WebSocket</a>
        </div>

        <div class="header">
            <h1>🌐 WebSocket API Test</h1>
            <p>Real-time subscriptions (public & authenticated)</p>
        </div>

        <div class="auth-box">
            <div>
                <label>API Key (for authenticated endpoints):</label>
                <input type="password" id="api-key" placeholder="Paste your API key" style="width: 300px;">
                <label>API Secret:</label>
                <input type="password" id="api-secret" placeholder="Paste your API secret" style="width: 300px;">
                <button class="btn btn-secondary" onclick="saveCredentials()">💾 Save</button>
                <span id="auth-status" style="margin-left: 10px; color: #888; font-size: 12px;"></span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-test">▶ Test All</button>
            <button class="btn btn-secondary" id="btn-clear">🗑 Clear Results</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✓ Connected</div>
                <div class="stat-value ok" id="stat-ok">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✗ Failed</div>
                <div class="stat-value fail" id="stat-fail">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⏳ Testing</div>
                <div class="stat-value pending" id="stat-pending">0</div>
            </div>
        </div>

        <div style="margin-bottom: 20px; padding: 10px; background: #252526; border-radius: 4px; color: #888; font-size: 12px;">
            Status: <span id="test-status">Ready</span>
        </div>

        <div class="endpoints-grid" id="endpoints-grid"></div>
    </div>

    <script>
        const WS_ENDPOINTS = [
            // 🌐 PUBLIC WEBSOCKET (3)
            { path: '/ws', category: 'Public', description: 'Subscribe to ticker updates', auth: false, wsType: 'ticker' },
            { path: '/ws', category: 'Public', description: 'Subscribe to orderbook updates', auth: false, wsType: 'orderbook' },
            { path: '/ws', category: 'Public', description: 'Subscribe to trade updates', auth: false, wsType: 'trade' },

            // 🔐 AUTHENTICATED WEBSOCKET (3)
            { path: '/api/auth/ws', category: 'Authenticated', description: 'Subscribe to wallet updates', auth: true, wsType: 'user_wallets' },
            { path: '/api/auth/ws', category: 'Authenticated', description: 'Subscribe to order updates', auth: true, wsType: 'user_orders' },
            { path: '/api/auth/ws', category: 'Authenticated', description: 'Subscribe to trade updates', auth: true, wsType: 'user_trades' },
        ];

        let testResults = {};

        document.getElementById('stat-total').textContent = WS_ENDPOINTS.length;
        document.getElementById('stat-pending').textContent = WS_ENDPOINTS.length;
        loadCredentials();
        renderEndpoints();

        document.getElementById('btn-test').addEventListener('click', testAll);
        document.getElementById('btn-clear').addEventListener('click', clearResults);

        function saveCredentials() {
            const apiKey = document.getElementById('api-key').value;
            const apiSecret = document.getElementById('api-secret').value;

            if (apiKey && apiSecret) {
                localStorage.setItem('test_api_key', apiKey);
                localStorage.setItem('test_api_secret', apiSecret);
                document.getElementById('auth-status').textContent = '✓ Saved';
                document.getElementById('auth-status').style.color = '#4ec9b0';
            } else {
                document.getElementById('auth-status').textContent = '✓ Optional (for authenticated endpoints)';
                document.getElementById('auth-status').style.color = '#888';
            }
        }

        function loadCredentials() {
            const apiKey = localStorage.getItem('test_api_key');
            const apiSecret = localStorage.getItem('test_api_secret');

            if (apiKey && apiSecret) {
                document.getElementById('api-key').value = apiKey;
                document.getElementById('api-secret').value = apiSecret;
                document.getElementById('auth-status').textContent = '✓ Loaded';
                document.getElementById('auth-status').style.color = '#4ec9b0';
            }
        }

        function renderEndpoints() {
            const grid = document.getElementById('endpoints-grid');
            grid.innerHTML = '';

            WS_ENDPOINTS.forEach((endpoint, idx) => {
                const result = testResults[idx];
                const card = document.createElement('div');
                card.className = `endpoint-card ${result?.status || 'pending'}`;

                const statusBadge = result ?
                    `<span class="status-badge ${result.status}">${result.status === 'ok' ? '✓ CONNECTED' : '✗ FAILED'}</span>` :
                    `<span class="status-badge pending">⏳ Testing</span>`;

                const authLabel = endpoint.auth ? '<span style="color: #f48771; font-size: 11px; margin-left: 8px;">🔒 Auth</span>' : '';

                let html = `
                    <div style="margin-bottom: 10px;">
                        <span class="endpoint-method">WS</span>
                        <span style="color: #888; font-size: 12px;">${endpoint.category}</span>
                        ${authLabel}
                    </div>
                    <div class="endpoint-path">${endpoint.path}</div>
                    <div style="color: #aaa; font-size: 12px; margin: 5px 0;">Type: <span style="color: #ce9178;">${endpoint.wsType}</span></div>
                    <div style="color: #888; font-size: 12px;">${endpoint.description}</div>
                    <div class="endpoint-status">${statusBadge}</div>
                `;

                if (result) {
                    html += `<div class="endpoint-time">⏱ ${result.time}ms</div>`;
                    if (result.status === 'fail') {
                        html += `<div class="endpoint-error">❌ ${result.error}</div>`;
                    }
                }

                card.innerHTML = html;
                grid.appendChild(card);
            });
        }

        async function testAll() {
            const btn = document.getElementById('btn-test');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            const apiKey = localStorage.getItem('test_api_key');
            const apiSecret = localStorage.getItem('test_api_secret');

            for (let i = 0; i < WS_ENDPOINTS.length; i++) {
                const endpoint = WS_ENDPOINTS[i];
                const epLabel = endpoint.wsType;
                document.getElementById('test-status').textContent = `Testing ${i + 1}/${WS_ENDPOINTS.length}... (${epLabel})`;

                await testWebSocket(i, endpoint, apiKey, apiSecret);
                await new Promise(r => setTimeout(r, 1000));
            }

            updateStats();
            renderEndpoints();
            btn.disabled = false;
            btn.textContent = '▶ Test All';
            document.getElementById('test-status').textContent = 'Testing complete!';
        }

        async function testWebSocket(idx, endpoint, apiKey, apiSecret) {
            const startTime = Date.now();

            try {
                let wsUrl = 'wss://exchange-api.lcx.com' + endpoint.path;

                // For authenticated endpoints, get signature from server
                if (endpoint.auth && apiKey && apiSecret) {
                    try {
                        const sigRes = await fetch('/generate-ws-signature', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                wsPath: endpoint.path,
                                apiKey,
                                apiSecret
                            })
                        });
                        const sigData = await sigRes.json();

                        if (sigData.url) {
                            wsUrl = sigData.url;
                        } else if (sigData.signature && sigData.timestamp) {
                            wsUrl += `?x-access-key=${apiKey}&x-access-sign=${sigData.signature}&x-access-timestamp=${sigData.timestamp}`;
                        } else {
                            console.warn(`[WS ${endpoint.wsType}] Failed to generate signature`);
                        }
                    } catch (sigErr) {
                        console.warn(`[WS ${endpoint.wsType}] Signature generation error: ${sigErr.message}`);
                    }
                } else if (endpoint.auth && !apiKey) {
                    console.warn(`[WS ${endpoint.wsType}] Auth endpoint needs API credentials`);
                }

                console.log(`[WS ${endpoint.wsType}] Connecting to ${wsUrl}`);

                const ws = new WebSocket(wsUrl);
                let timeout = setTimeout(() => { ws.close(); }, 3000);
                let received = false;

                ws.onopen = () => {
                    console.log(`[WS ${endpoint.wsType}] Connected`);
                    // Send subscription message
                    const subMsg = {
                        Topic: endpoint.wsType === 'ticker' || endpoint.wsType === 'orderbook' || endpoint.wsType === 'trade' ? 'LCX/USDC' : undefined,
                        Type: endpoint.wsType
                    };
                    const msgStr = JSON.stringify(subMsg);
                    console.log(`[WS ${endpoint.wsType}] Sending: ${msgStr}`);
                    ws.send(msgStr);
                };

                ws.onmessage = (event) => {
                    if (!received) {
                        received = true;
                        clearTimeout(timeout);
                        const time = Date.now() - startTime;
                        console.log(`[WS ${endpoint.wsType}] ✓ Received data`);
                        testResults[idx] = { status: 'ok', time };
                        ws.close();
                    }
                };

                ws.onerror = () => {
                    clearTimeout(timeout);
                    console.log(`[WS ${endpoint.wsType}] ✗ Error`);
                    if (!received) {
                        const time = Date.now() - startTime;
                        testResults[idx] = { status: 'fail', time, error: 'Connection error' };
                    }
                };

                ws.onclose = () => {
                    clearTimeout(timeout);
                    if (!received) {
                        const time = Date.now() - startTime;
                        console.log(`[WS ${endpoint.wsType}] Connection closed`);
                        if (!testResults[idx]) {
                            testResults[idx] = { status: 'fail', time, error: 'No response' };
                        }
                    }
                };
            } catch (err) {
                const time = Date.now() - startTime;
                console.log(`[WS ${endpoint.wsType}] ✗ Exception: ${err.message}`);
                testResults[idx] = { status: 'fail', time, error: err.message };
            }
        }

        function updateStats() {
            const total = WS_ENDPOINTS.length;
            const ok = Object.values(testResults).filter(r => r.status === 'ok').length;
            const fail = Object.values(testResults).filter(r => r.status === 'fail').length;
            const pending = total - ok - fail;

            document.getElementById('stat-ok').textContent = ok;
            document.getElementById('stat-fail').textContent = fail;
            document.getElementById('stat-pending').textContent = pending;
        }

        function clearResults() {
            testResults = {};
            document.getElementById('stat-ok').textContent = '0';
            document.getElementById('stat-fail').textContent = '0';
            document.getElementById('stat-pending').textContent = WS_ENDPOINTS.length;
            document.getElementById('test-status').textContent = 'Ready';
            renderEndpoints();
        }
    </script>
</body>
</html>
