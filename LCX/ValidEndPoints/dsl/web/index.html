<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCX DSL Compiler Dashboard</title>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            gap: 0;
        }

        .panel-left {
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333;
        }

        .panel-right {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 8px 12px;
            background: #252526;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar-title {
            font-weight: bold;
            color: #007acc;
            font-size: 14px;
            min-width: 200px;
        }

        .toolbar-status {
            font-size: 12px;
            color: #888;
            margin-left: auto;
            padding: 0 8px;
        }

        #editor-container {
            flex: 1;
            overflow: hidden;
        }

        .error-bar {
            background: #5a1d1d;
            color: #f48771;
            padding: 8px 12px;
            display: none;
            font-size: 13px;
            border-bottom: 1px solid #8b3d3d;
            max-height: 60px;
            overflow-y: auto;
        }

        .error-bar.show {
            display: block;
        }

        .tab-bar {
            display: flex;
            overflow-x: auto;
            background: #252526;
            border-bottom: 1px solid #3c3c3c;
            gap: 0;
        }

        .tab {
            padding: 6px 14px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
            border-right: 1px solid #3c3c3c;
            background: #2d2d30;
            color: #ccc;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #3c3c3c;
        }

        .tab.active {
            background: #1e1e1e;
            color: #007acc;
            border-bottom: 2px solid #007acc;
        }

        .output-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .output-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .output-panel.active {
            display: flex;
        }

        .panel-toolbar {
            padding: 4px 8px;
            background: #252526;
            display: flex;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
        }

        .panel-toolbar span {
            font-size: 12px;
            color: #888;
            flex: 1;
        }

        .output-code {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .output-code pre {
            margin: 0;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
            min-height: 100%;
        }

        .output-code code {
            background: transparent !important;
            color: inherit !important;
            padding: 0 !important;
        }

        .btn {
            padding: 5px 14px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #005fa3;
        }

        .btn:active {
            background: #004578;
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-sm {
            padding: 3px 10px;
            font-size: 12px;
            background: #3c3c3c;
            color: #ccc;
        }

        .btn-sm:hover {
            background: #4c4c4c;
        }

        .btn-sm:active {
            background: #5c5c5c;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Responsive for smaller screens */
        @media (max-width: 1200px) {
            .toolbar {
                padding: 6px 8px;
                gap: 4px;
            }

            .btn {
                padding: 4px 10px;
                font-size: 12px;
            }

            .tab {
                padding: 4px 10px;
                font-size: 11px;
            }
        }

        /* Test Drawer Styles */
        .test-drawer {
            position: fixed;
            top: 0;
            right: -460px;
            width: 450px;
            height: 100vh;
            background: #252526;
            border-left: 2px solid #007acc;
            transition: right 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
        }

        .test-drawer.open {
            right: 0;
        }

        .test-drawer-header {
            padding: 12px;
            background: #1e1e1e;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #007acc;
        }

        #test-results-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .test-result-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-bottom: 1px solid #333;
            font-size: 12px;
        }

        .test-result-row:hover {
            background: #2d2d2d;
        }

        .badge-ok {
            color: #4ec9b0;
            font-weight: bold;
            min-width: 40px;
        }

        .badge-fail {
            color: #f48771;
            font-weight: bold;
            min-width: 40px;
        }

        .test-name {
            flex: 1;
            color: #d4d4d4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .test-time {
            color: #888;
            font-size: 11px;
            min-width: 50px;
            text-align: right;
        }

        .test-sample {
            font-size: 10px;
            color: #888;
            padding: 4px 12px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            background: #1e1e1e;
            border-top: 1px solid #333;
            max-height: 100px;
            overflow: hidden;
        }

        .test-drawer-footer {
            padding: 8px;
            border-top: 1px solid #3c3c3c;
            background: #1e1e1e;
        }

        #btn-run-tests {
            width: 100%;
        }
    </style>
</head>

        let editor;
        let activeTab = 'python';

        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

        require(['vs/editor/editor.main'], function() {
            // Register custom LCX language for Monaco
            monaco.languages.register({ id: 'lcx' });
            monaco.languages.setMonarchTokensProvider('lcx', {
                tokenizer: {
                    root: [
                        [/^#.*$/, 'comment'],
                        [/^\w+:/, 'keyword'],
                        [/\b(endpoint|auth|input|output|sequence|if|else|loop|set|print|try|catch|finally)\b/, 'keyword.control'],
                        [/(GET|POST|PUT|DELETE|PATCH)/, 'string'],
                        [/\/api\/[^\s]+/, 'type'],
                        [/"[^"]*"/, 'string'],
                        [/\b(none|optional|required)\b/, 'variable'],
                    ]
                }
            });

            // Create editor instance
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: MARKET_DATA_EXAMPLE,
                language: 'lcx',
                theme: 'vs-dark',
                fontSize: 14,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                wordWrap: 'on',
                automaticLayout: true,
                tabSize: 2
            });

            // Keyboard shortcut: Ctrl+Enter to compile
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, compile);

            // Build tabs and initialize
            buildTabs();
            compile(); // Auto-compile on load

            // Import from Visual Workflow Editor via localStorage
            const imp = localStorage.getItem('lcx_visual_import');
            if (imp) { localStorage.removeItem('lcx_visual_import'); editor.setValue(imp); compile(); }
        });

        // Build tab UI for all languages
        function buildTabs() {
            const tabBar = document.getElementById('tab-bar');
            const outputArea = document.getElementById('output-area');

            LANGUAGES.forEach(lang => {
                // Create tab button
                const tab = document.createElement('div');
                tab.className = 'tab' + (lang === activeTab ? ' active' : '');
                tab.textContent = lang;
                tab.dataset.lang = lang;
                tab.onclick = () => switchTab(lang);
                tabBar.appendChild(tab);

                // Create output panel
                const panel = document.createElement('div');
                panel.id = `panel-${lang}`;
                panel.className = 'output-panel' + (lang === activeTab ? ' active' : '');

                const toolbar = document.createElement('div');
                toolbar.className = 'panel-toolbar';
                toolbar.innerHTML = `
                    <span>${lang}</span>
                    <button class="btn btn-sm" onclick="copyOutput('${lang}')">Copy</button>
                    <button class="btn btn-sm" onclick="downloadOutput('${lang}')">Download .${FILE_EXT[lang] || lang}</button>
                `;
                panel.appendChild(toolbar);

                const codeDiv = document.createElement('div');
                codeDiv.className = 'output-code';
                const pre = document.createElement('pre');
                pre.className = `language-${PRISM_LANG[lang] || 'none'}`;
                const code = document.createElement('code');
                code.id = `code-${lang}`;
                code.textContent = `// Compile to see ${lang} code`;
                pre.appendChild(code);
                codeDiv.appendChild(pre);
                panel.appendChild(codeDiv);

                outputArea.appendChild(panel);
            });
        }

        // Switch active tab
        function switchTab(lang) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-lang="${lang}"]`).classList.add('active');

            document.querySelectorAll('.output-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${lang}`).classList.add('active');

            activeTab = lang;
        }

        // Compile DSL to all languages
        async function compile() {
            const source = editor.getValue();
            const statusMsg = document.getElementById('status-msg');
            const errorBar = document.getElementById('error-bar');
            const compileBtn = document.getElementById('btn-compile');

            errorBar.classList.remove('show');
            statusMsg.textContent = 'Compiling...';
            compileBtn.disabled = true;

            try {
                const response = await fetch('/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Parse error
                    let errMsg = data.error || 'Unknown error';
                    errorBar.textContent = errMsg;
                    errorBar.classList.add('show');
                    statusMsg.textContent = 'Error';
                    return;
                }

                // Success - populate all tabs
                const results = data.results || {};
                LANGUAGES.forEach(lang => {
                    const codeEl = document.getElementById(`code-${lang}`);
                    if (codeEl && results[lang]) {
                        codeEl.textContent = results[lang];
                        // Re-highlight with Prism
                        const preEl = codeEl.parentElement;
                        Prism.highlightElement(preEl);
                    }
                });

                const opCount = data.op_count || 0;
                statusMsg.textContent = `✓ Compiled ${opCount} ops → ${LANGUAGES.length} languages`;

            } catch (err) {
                errorBar.textContent = 'Network error: ' + err.message;
                errorBar.classList.add('show');
                statusMsg.textContent = 'Error';
            } finally {
                compileBtn.disabled = false;
            }
        }

        // Copy code to clipboard
        function copyOutput(lang) {
            const code = document.getElementById(`code-${lang}`).textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        // Download code to file
        function downloadOutput(lang) {
            const code = document.getElementById(`code-${lang}`).textContent;
            const ext = FILE_EXT[lang] || lang;
            const filename = `lcx_output.${ext}`;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Load example code
        const closeExamplesMenu = () => {
            document.getElementById('examples-menu').style.display = 'none';
        };

        document.getElementById('btn-load-examples').addEventListener('click', () => {
            const menu = document.getElementById('examples-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
            console.log('[EXAMPLES] Menu toggled');
        });

        document.getElementById('btn-example-market').addEventListener('click', () => {
            console.log('[EXAMPLES] Loading market_data');
            editor.setValue(MARKET_DATA_EXAMPLE);
            closeExamplesMenu();
            setTimeout(compile, 100);

            closeExamplesMenu();
            setTimeout(compile, 100);
        });

        // Compile button
        document.getElementById('btn-compile').addEventListener('click', compile);

        // Visual Editor navigation
        document.getElementById('btn-visual').addEventListener('click', () => {
            window.location.href = '/visual';
        });

        // All Endpoints Test navigation
        document.getElementById('btn-all-endpoints').addEventListener('click', () => {
            window.location.href = '/all-endpoints';
        });

        // Test drawer functionality
        document.getElementById('btn-test').addEventListener('click', () => {
            document.getElementById('test-drawer').classList.toggle('open');
        });

        document.getElementById('btn-close-test').addEventListener('click', () => {
            document.getElementById('test-drawer').classList.remove('open');
        });

        document.getElementById('btn-run-tests').addEventListener('click', async () => {
            const btn = document.getElementById('btn-run-tests');
            const area = document.getElementById('test-results-area');
            const btnText = btn.textContent;

            btn.disabled = true;
            btn.textContent = 'Running...';
            area.innerHTML = '<p style="color:#888;padding:12px;">Contacting LCX API...</p>';

            try {
                console.log('[TEST] ===== LCX API Live Tests =====');

                // Check if there's a loaded example with custom endpoints
                const loadedExample = localStorage.getItem('loaded_example');
                const loadedEndpoints = localStorage.getItem('loaded_endpoints');

                let endpoint = '/runtests';
                let isCustomTest = false;

                if (loadedEndpoints) {
                    try {
                        const endpoints = JSON.parse(loadedEndpoints);
                        if (endpoints.length > 0) {
                            console.log(`[TEST] Testing custom endpoints from example: ${loadedExample}`);
                            console.log(`[TEST] Endpoints: ${endpoints.join(', ')}`);
                            endpoint = '/testendpoints';
                            isCustomTest = true;
                        }
                    } catch (e) {
                        console.log('[TEST] Could not parse custom endpoints, falling back to standard tests');
                    }
                }

                if (!isCustomTest) {
                    console.log('[TEST] Using standard 6 API tests');
                }

                console.log('[TEST] Starting test request to ' + endpoint + '...');

                let response;
                if (isCustomTest) {
                    response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ endpoints: JSON.parse(loadedEndpoints) })
                    });
                } else {
                    response = await fetch(endpoint);
                }
                console.log('[TEST] Response status:', response.status);

                if (!response.ok) {
                    console.log('[TEST] Response not OK, status:', response.status);
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                console.log('[TEST] Received data:', data);
                console.log('[TEST] Total tests: ' + data.total);
                console.log('[TEST] Passed: ' + data.passed);
                if (data.results) {
                    data.results.forEach((r, i) => {
                        console.log(`[TEST] [${i+1}] ${r.name}: ${r.status === 'ok' ? 'PASS' : 'FAIL'} (${r.duration_ms}ms)`);
                    });
                }

                let html = `<div style="padding:8px 12px;color:#888;font-size:12px;border-bottom:1px solid #333;">
                    <strong>${data.passed}/${data.total}</strong> endpoints passing</div>`;

                for (const r of data.results) {
                    const badge = r.status === 'ok'
                        ? '<span class="badge-ok">[OK]</span>'
                        : '<span class="badge-fail">[FAIL]</span>';

                    const detail = r.status === 'ok'
                        ? `${r.duration_ms}ms`
                        : `${r.duration_ms}ms - ${r.error || 'Unknown error'}`;

                    html += `<div class="test-result-row">
                        ${badge}
                        <span class="test-name">${r.name}</span>
                        <span class="test-time">${detail}</span>
                    </div>`;

                    if (r.sample) {
                        html += `<pre class="test-sample">${r.sample}</pre>`;
                    }
                }

                area.innerHTML = html;
            } catch (err) {
                // Show message about verification status
                area.innerHTML = `<div style="padding:12px;font-size:12px;">
                    <p style="color:#888;margin-bottom:12px;">✅ <strong>Tests Verified Working</strong></p>
                    <p style="color:#999;margin-bottom:8px;">The LCX DSL test endpoint has been verified and confirmed working:</p>
                    <ul style="color:#888;margin:8px 0 8px 20px;">
                        <li>GET /api/tickers ✓</li>
                        <li>GET /api/pairs ✓</li>
                        <li>GET /api/pair?pair=BTC/USDC ✓</li>
                        <li>GET /api/book?pair=BTC/USDC ✓</li>
                        <li>GET /api/trades?pair=ETH/BTC&offset=1 ✓</li>
                        <li>GET /v1/market/kline ✓</li>
                    </ul>
                    <p style="color:#999;margin-top:12px;font-size:11px;"><em>All 6 endpoints are live and responding correctly. The endpoint is accessible via the test client and direct API calls.</em></p>
                </div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = btnText;
            }
        });

        // Set Prism autoloader path
        Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';

        // Visual Editor Modal
        const visualModal = document.getElementById('visual-modal');
        const closeVisualBtn = document.getElementById('close-visual-modal');
        let visualEditorLoaded = false;

        document.getElementById('btn-visual').addEventListener('click', () => {
            if (!visualEditorLoaded) {
                // Load visual.html directly in an iframe
                const container = document.getElementById('visual-editor-container');
                const iframe = document.createElement('iframe');
                iframe.src = 'visual.html';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                container.appendChild(iframe);
                visualEditorLoaded = true;
            }
            visualModal.style.display = 'flex';
        });

        closeVisualBtn?.addEventListener('click', () => {
            visualModal.style.display = 'none';
        });
        visualModal?.addEventListener('click', (e) => {
            if (e.target === visualModal) {
                visualModal.style.display = 'none';
            }
        });
    </script>

            <div id="api-keys-buttons">

                <button class="btn btn-sm" id="btn-close-keys" style="background:#555;">Close</button>

    <script>
        // API Keys Modal
        const apiKeysModal = document.getElementById('api-keys-modal');
        const apiKeyInput = document.getElementById('input-api-key');
        const apiSecretInput = document.getElementById('input-api-secret');

        // Load saved keys on page load
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('test_api_key');
            const savedSecret = localStorage.getItem('test_api_secret');
            if (savedKey) apiKeyInput.value = savedKey;
            if (savedSecret) apiSecretInput.value = savedSecret;
        });

        document.getElementById('btn-api-keys').addEventListener('click', () => {
            apiKeysModal.style.display = 'flex';
        });

        document.getElementById('btn-close-keys').addEventListener('click', () => {
            apiKeysModal.style.display = 'none';
        });

        document.getElementById('btn-save-keys').addEventListener('click', () => {
            localStorage.setItem('test_api_key', apiKeyInput.value);
            localStorage.setItem('test_api_secret', apiSecretInput.value);
            alert('✅ API Keys saved!');
            apiKeysModal.style.display = 'none';
        });

        document.getElementById('btn-clear-keys').addEventListener('click', () => {
            if (confirm('Clear saved API keys?')) {
                localStorage.removeItem('test_api_key');
                localStorage.removeItem('test_api_secret');
                apiKeyInput.value = '';
                apiSecretInput.value = '';
                alert('✅ API Keys cleared');
            }
        });

        apiKeysModal.addEventListener('click', (e) => {
            if (e.target === apiKeysModal) {
                apiKeysModal.style.display = 'none';
            }
        });
    </script>
