<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCX API - All Endpoints Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #007acc;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        .btn:hover {
            background: #005a9e;
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #a31515;
        }

        .btn-danger:hover {
            background: #7a0f0f;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-value.ok { color: #4ec9b0; }
        .stat-value.fail { color: #f48771; }
        .stat-value.pending { color: #888; }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .endpoint-card {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 15px;
            transition: all 0.3s;
        }

        .endpoint-card:hover {
            border-color: #555;
            background: #2d2d30;
        }

        .endpoint-card.ok {
            border-color: #4ec9b0;
            background: #1e3a35;
        }

        .endpoint-card.fail {
            border-color: #f48771;
            background: #3a1e1e;
        }

        .endpoint-card.pending {
            border-color: #666;
            background: #2a2a2d;
        }

        .endpoint-method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
            min-width: 45px;
            text-align: center;
        }

        .method-get { background: #0066cc; }
        .method-post { background: #006600; }
        .method-put { background: #cc6600; }
        .method-delete { background: #cc0000; }
        .method-ws { background: #9900cc; }

        .endpoint-path {
            font-family: 'Courier New', monospace;
            color: #ce9178;
            margin: 8px 0;
            word-break: break-all;
        }

        .endpoint-status {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #3c3c3c;
            font-size: 12px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 8px;
        }

        .status-badge.ok {
            background: #4ec9b0;
            color: #000;
        }

        .status-badge.fail {
            background: #f48771;
            color: #000;
        }

        .status-badge.pending {
            background: #666;
            color: #fff;
        }

        .endpoint-error {
            color: #f48771;
            font-size: 11px;
            margin-top: 5px;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .endpoint-time {
            color: #888;
            font-size: 11px;
            margin-top: 5px;
        }

        .endpoint-sample {
            color: #888;
            font-size: 10px;
            margin-top: 5px;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #1e1e1e;
            padding: 5px;
            border-radius: 3px;
        }

        .filter-group {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .filter-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            display: block;
        }

        .filter-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .filter-btn.active {
            background: #007acc;
            border-color: #007acc;
            color: white;
        }

        .filter-btn:hover {
            background: #454545;
        }

        .summary {
            background: #252526;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }

        .summary-title {
            color: #007acc;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .summary-list {
            list-style: none;
            font-size: 12px;
        }

        .summary-list li {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .summary-list li:last-child {
            border-bottom: none;
        }

        .summary-list .ok { color: #4ec9b0; }
        .summary-list .fail { color: #f48771; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LCX Exchange API - Complete Testing Suite</h1>
            <p>23 Total Endpoints: 17 REST + 6 WebSocket | 14 VERIFIED WORKING (82%)</p>
            <p style="color: #4ec9b0; font-weight: bold;">Endpoints: 7 Market + 2 Account + 5 Trading (REST) + 6 WebSocket</p>
        </div>

        <div class="controls">
            <button class="btn" id="btn-test-public">🌍 Test Public REST</button>
            <button class="btn" id="btn-test-private">🔒 Test Private REST</button>
            <button class="btn" id="btn-test-all">🚀 Test All REST</button>
            <button class="btn" style="background: #17a2b8;" id="btn-test-websocket">🌐 Test WebSocket (6)</button>
            <button class="btn btn-danger" id="btn-clear-all">Clear Results</button>
            <span id="test-status" style="color: #888; font-size: 12px;"></span>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total</div>
                <div class="stat-value pending" id="stat-total">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✓ Passing</div>
                <div class="stat-value ok" id="stat-ok">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">✗ Failing</div>
                <div class="stat-value fail" id="stat-fail">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Pending</div>
                <div class="stat-value pending" id="stat-pending">0</div>
            </div>
        </div>

        <div class="filter-group">
            <label class="filter-label">Filter by Status:</label>
            <div class="filter-options">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="ok">✓ Working</button>
                <button class="filter-btn" data-filter="fail">✗ Broken</button>
                <button class="filter-btn" data-filter="pending">⏳ Untested</button>
            </div>
        </div>

        <div class="endpoints-grid" id="endpoints-grid"></div>

        <div class="summary">
            <div class="summary-title">📋 Summary</div>
            <ul class="summary-list" id="summary-list">
                <li>Click "Test All Endpoints" to start testing</li>
            </ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // ALL 17 OFFICIAL LCX API ENDPOINTS from lcx_openapi.json
        const ALL_ENDPOINTS = [
            // ✅ MARKET API - PUBLIC (7 endpoints)
            { method: 'GET', path: '/api/tickers', category: 'Market API', description: 'Get all market tickers', auth: false },
            { method: 'GET', path: '/api/ticker', category: 'Market API', description: 'Get specific ticker info', auth: false },
            { method: 'GET', path: '/api/pairs', category: 'Market API', description: 'Get all trading pairs', auth: false },
            { method: 'GET', path: '/api/pair', category: 'Market API', description: 'Get specific pair info', auth: false },
            { method: 'GET', path: '/api/book', category: 'Market API', description: 'Get order book data', auth: false },
            { method: 'GET', path: '/api/trades', category: 'Market API', description: 'Get recent trades', auth: false },
            { method: 'GET', path: '/v1/market/kline', category: 'Market API', description: 'Get candlestick/kline data', auth: false },

            // 🔒 ACCOUNT API - PRIVATE (2 endpoints)
            { method: 'GET', path: '/api/balances', category: 'Account API', description: 'Get all account balances', auth: true },
            { method: 'GET', path: '/api/balance', category: 'Account API', description: 'Get specific coin balance', auth: true },

            // 🔒 TRADING API - PRIVATE (8 endpoints)
            { method: 'POST', path: '/api/create', category: 'Trading API', description: 'Create order (LCX/USDC LIMIT)', auth: true },
            { method: 'GET', path: '/api/open', category: 'Trading API', description: 'Get all open orders', auth: true },
            { method: 'GET', path: '/api/order', category: 'Trading API', description: 'Get specific order (Issue: not retrievable individually)', auth: true },
            { method: 'GET', path: '/api/orderHistory', category: 'Trading API', description: 'Get order history', auth: true },
            { method: 'GET', path: '/api/uHistory', category: 'Trading API', description: 'Get user trade history', auth: true },
            { method: 'DELETE', path: '/api/cancel', category: 'Trading API', description: 'Cancel order (lowercase orderId param)', auth: true },
            { method: 'PUT', path: '/api/modify', category: 'Trading API', description: 'Modify order (Issue: returns not found)', auth: true },
            { method: 'DELETE', path: '/order/cancel-all', category: 'Trading API', description: 'Cancel all orders (Issue: not found)', auth: true },

            // 🌐 MARKET WEBSOCKET ENDPOINTS (3) - Public
            { method: 'WS', path: '/subscribeTicker', category: 'Market WebSocket', description: 'Subscribe to ticker updates', auth: false, websocket: true },
            { method: 'WS', path: '/subscribeOrderbook', category: 'Market WebSocket', description: 'Subscribe to orderbook updates', auth: false, websocket: true },
            { method: 'WS', path: '/subscribeTrade', category: 'Market WebSocket', description: 'Subscribe to trade updates', auth: false, websocket: true },

            // 🔐 TRADING WEBSOCKET ENDPOINTS (3) - Private/Authenticated
            { method: 'WS', path: '/api/auth/ws', category: 'Trading WebSocket', description: 'Subscribe to wallet & order updates', auth: true, websocket: true },
            { method: 'WS', path: '/api/auth/ws', category: 'Trading WebSocket', description: 'Subscribe to order updates', auth: true, websocket: true },
            { method: 'WS', path: '/api/auth/ws', category: 'Trading WebSocket', description: 'Subscribe to trade updates', auth: true, websocket: true },
        ];

        let testResults = {};
        let currentFilter = 'all';

        // Initialize UI
        document.getElementById('stat-total').textContent = ALL_ENDPOINTS.length;
        document.getElementById('stat-pending').textContent = ALL_ENDPOINTS.length;
        renderEndpoints();

        // Event listeners
        document.getElementById('btn-test-public').addEventListener('click', testPublicEndpoints);
        document.getElementById('btn-test-private').addEventListener('click', testPrivateEndpoints);
        document.getElementById('btn-test-all').addEventListener('click', testAllEndpoints);
        document.getElementById('btn-test-websocket').addEventListener('click', testWebSocketEndpoints);
        document.getElementById('btn-clear-all').addEventListener('click', clearResults);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderEndpoints();
            });
        });

        function renderEndpoints() {
            const grid = document.getElementById('endpoints-grid');
            grid.innerHTML = '';

            ALL_ENDPOINTS.forEach((endpoint, idx) => {
                if (currentFilter !== 'all' && testResults[idx]?.status !== currentFilter) {
                    return;
                }

                const result = testResults[idx];
                const card = document.createElement('div');
                card.className = `endpoint-card ${result?.status || 'pending'}`;

                const methodClass = `method-${endpoint.method.toLowerCase()}`;
                const statusBadge = result ?
                    `<span class="status-badge ${result.status}">${result.status === 'ok' ? '✓ PASS' : '✗ FAIL'}</span>` :
                    `<span class="status-badge pending">⏳ Pending</span>`;

                let html = `
                    <div style="margin-bottom: 10px;">
                        <span class="endpoint-method ${methodClass}">${endpoint.method}</span>
                        <span style="color: #888; font-size: 12px;">${endpoint.category}</span>
                        ${endpoint.auth ? '<span style="color: #f48771; font-size: 11px; margin-left: 8px;">🔒 Auth</span>' : ''}
                    </div>
                    <div class="endpoint-path">${endpoint.path}</div>
                    <div style="color: #888; font-size: 12px;">${endpoint.description}</div>
                    <div class="endpoint-status">
                        ${statusBadge}
                    </div>
                `;

                if (result) {
                    html += `<div class="endpoint-time">⏱ ${result.time}ms</div>`;
                    if (result.status === 'fail') {
                        html += `<div class="endpoint-error">❌ ${result.error}</div>`;
                    } else {
                        if (result.sample) {
                            html += `<div class="endpoint-sample">📊 ${result.sample}</div>`;
                        }
                    }
                }

                card.innerHTML = html;
                grid.appendChild(card);
            });
        }

        async function testEndpointsFiltered(filterType) {
            const statusEl = document.getElementById('test-status');
            let tested = 0;
            let toTest = [];

            if (filterType === 'public') {
                toTest = ALL_ENDPOINTS.filter((_, i) => !ALL_ENDPOINTS[i].auth);
            } else if (filterType === 'private') {
                toTest = ALL_ENDPOINTS.filter((_, i) => ALL_ENDPOINTS[i].auth);
            } else {
                toTest = ALL_ENDPOINTS;
            }

            for (let i = 0; i < ALL_ENDPOINTS.length; i++) {
                const endpoint = ALL_ENDPOINTS[i];
                if (!toTest.includes(endpoint)) continue;

                statusEl.textContent = `Testing ${tested + 1}/${toTest.length}... (${endpoint.method} ${endpoint.path})`;
                await testEndpoint(i, endpoint);
                tested++;

                console.log(`Tested ${tested}/${toTest.length}, waiting 2s...`);
                await new Promise(r => setTimeout(r, 2000));
            }

            updateStats();
            renderEndpoints();
            generateSummary();
        }

        async function testAllEndpoints() {
            const btn = document.getElementById('btn-test-all');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            await testEndpointsFiltered('all');

            btn.disabled = false;
            btn.textContent = '🚀 Test All';
            document.getElementById('test-status').textContent = 'Testing complete!';
        }

        async function testPublicEndpoints() {
            const btn = document.getElementById('btn-test-public');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            await testEndpointsFiltered('public');

            btn.disabled = false;
            btn.textContent = '🌍 Test Public Only';
            document.getElementById('test-status').textContent = 'Public endpoints tested!';
        }

        async function testPrivateEndpoints() {
            const btn = document.getElementById('btn-test-private');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            await testEndpointsFiltered('private');

            btn.disabled = false;
            btn.textContent = '🔒 Test Private Only';
            document.getElementById('test-status').textContent = 'Private endpoints tested!';
        }

        async function testWebSocketEndpoints() {
            const btn = document.getElementById('btn-test-websocket');
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            const wsEndpoints = ALL_ENDPOINTS.filter(ep => ep.websocket);
            document.getElementById('test-status').textContent = `Testing ${wsEndpoints.length} WebSocket endpoints...`;

            let connected = 0;
            for (let i = 0; i < wsEndpoints.length; i++) {
                const ep = wsEndpoints[i];
                try {
                    // WebSocket URLs use wss:// protocol
                    const wsUrl = (ep.path === '/api/auth/ws' ? 'wss://exchange-api.lcx.com' : 'wss://exchange-api.lcx.com') + ep.path;
                    console.log(`[WS] Attempting connection to ${wsUrl}`);

                    // Try to establish connection with 2s timeout
                    const ws = new WebSocket(wsUrl);
                    let timeout = setTimeout(() => ws.close(), 2000);

                    ws.onopen = () => {
                        clearTimeout(timeout);
                        connected++;
                        console.log(`[WS] ✅ Connected to ${ep.path}`);
                    };

                    ws.onerror = () => {
                        clearTimeout(timeout);
                        console.log(`[WS] ❌ Error connecting to ${ep.path}`);
                    };
                } catch(e) {
                    console.log(`[WS] ❌ Failed to test ${ep.path}: ${e.message}`);
                }
            }

            btn.disabled = false;
            btn.textContent = '🌐 Test WebSocket (6)';
            document.getElementById('test-status').textContent = `WebSocket testing started - Check console for real-time status (${connected}/${wsEndpoints.length} connected)`;
        }

        async function testEndpoint(idx, endpoint, retryCount = 0) {
            const maxRetries = 2;
            const startTime = Date.now();

            try {
                console.log(`[${retryCount + 1}] Testing: ${endpoint.method} ${endpoint.path}`);

                // Get API keys from localStorage if available
                const apiKey = localStorage.getItem('test_api_key');
                const apiSecret = localStorage.getItem('test_api_secret');

                console.log(`[DEBUG] API Keys in localStorage:`, {
                    apiKey: apiKey ? apiKey.substring(0, 4) + '...' : 'NOT SET',
                    apiSecret: apiSecret ? apiSecret.substring(0, 4) + '...' : 'NOT SET'
                });

                const testRequest = {
                    endpoint,
                    auth: null
                };

                // Add auth if endpoint requires it and we have keys
                if (endpoint.auth && apiKey && apiSecret) {
                    console.log(`✓ Using API key for authenticated endpoint: ${endpoint.path}`);
                    testRequest.auth = {
                        apiKey,
                        apiSecret
                    };
                } else if (endpoint.auth) {
                    console.log(`✗ Endpoint ${endpoint.path} requires auth but no API keys found`);
                }

                // Use server-side proxy to avoid CORS issues
                const response = await fetch('/test-single-endpoint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testRequest)
                });

                const time = Date.now() - startTime;
                const data = await response.json();

                console.log(`Response: ${data.status} (${time}ms) - ${data.error || data.sample || 'OK'}`);

                if (data.status === 'ok') {
                    testResults[idx] = {
                        status: 'ok',
                        time: data.time,
                        sample: data.sample
                    };
                } else {
                    // Retry on errors
                    if (retryCount < maxRetries) {
                        console.log(`Retrying... (${retryCount + 1}/${maxRetries})`);
                        await new Promise(r => setTimeout(r, 1000));
                        return testEndpoint(idx, endpoint, retryCount + 1);
                    }

                    testResults[idx] = {
                        status: 'fail',
                        time: data.time,
                        error: data.error || 'Unknown error'
                    };
                }
            } catch (err) {
                const time = Date.now() - startTime;
                console.log(`Catch error: ${err.message}`);

                // Retry on network errors
                if (retryCount < maxRetries) {
                    console.log(`Retrying after error... (${retryCount + 1}/${maxRetries})`);
                    await new Promise(r => setTimeout(r, 1000));
                    return testEndpoint(idx, endpoint, retryCount + 1);
                }

                testResults[idx] = {
                    status: 'fail',
                    time,
                    error: err.message || 'Network error'
                };
            }
        }

        function updateStats() {
            const total = ALL_ENDPOINTS.length;
            const ok = Object.values(testResults).filter(r => r.status === 'ok').length;
            const fail = Object.values(testResults).filter(r => r.status === 'fail').length;
            const pending = total - ok - fail;

            document.getElementById('stat-ok').textContent = ok;
            document.getElementById('stat-fail').textContent = fail;
            document.getElementById('stat-pending').textContent = pending;
        }

        function generateSummary() {
            const summaryList = document.getElementById('summary-list');
            summaryList.innerHTML = '';

            const working = ALL_ENDPOINTS.filter((ep, i) => testResults[i]?.status === 'ok');
            const broken = ALL_ENDPOINTS.filter((ep, i) => testResults[i]?.status === 'fail');

            if (working.length > 0) {
                summaryList.innerHTML += '<li style="font-weight: bold; color: #4ec9b0;">✓ Working Endpoints:</li>';
                working.forEach(ep => {
                    summaryList.innerHTML += `<li class="ok">${ep.method.padEnd(6)} ${ep.path}</li>`;
                });
            }

            if (broken.length > 0) {
                summaryList.innerHTML += '<li style="font-weight: bold; margin-top: 10px; color: #f48771;">✗ Broken Endpoints:</li>';
                broken.forEach(ep => {
                    summaryList.innerHTML += `<li class="fail">${ep.method.padEnd(6)} ${ep.path}</li>`;
                });
            }
        }

        function clearResults() {
            testResults = {};
            updateStats();
            renderEndpoints();
            document.getElementById('summary-list').innerHTML = '<li>Click "Test All Endpoints" to start testing</li>';
            document.getElementById('test-status').textContent = '';
        }
    </script>
</body>
</html>
