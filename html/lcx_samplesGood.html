<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCX API - Best Practice Samples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
            padding: 10px 20px;
        }
        .stat-number {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        /* Endpoint tabs */
        .endpoint-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .endpoint-tab {
            padding: 12px 20px;
            cursor: pointer;
            background: #ecf0f1;
            border-radius: 8px;
            transition: 0.3s;
            border: 2px solid transparent;
            font-weight: 500;
        }
        .endpoint-tab:hover {
            background: #dde4ea;
            transform: translateY(-2px);
        }
        .endpoint-tab.active {
            background: #667eea;
            color: white;
            border-color: #5568d3;
        }

        /* Content */
        .endpoint-content {
            display: none;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        .endpoint-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .endpoint-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        /* Language tabs */
        .lang-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .lang-tab {
            padding: 10px 16px;
            cursor: pointer;
            background: #f8f9fa;
            border-radius: 6px;
            transition: 0.2s;
            font-weight: 500;
            border: 2px solid transparent;
        }
        .lang-tab:hover {
            background: #e8eef7;
        }
        .lang-tab.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .lang-content {
            display: none;
        }
        .lang-content.active {
            display: block;
        }

        /* Code styling */
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        code {
            font-family: 'Courier New', 'Monaco', monospace;
        }

        .copy-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .copy-button:hover {
            background: #764ba2;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
            margin-top: 40px;
        }

        .info-box {
            background: #e8f4f8;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
    </style>
</head>

    <script>
        const endpoints = {"Authentication": {"auth": "To use LCX Trading APIs, users are required to first gain authentication. LCX uses API keys to allow access to the API. You can register a new LCX API key at LCX Exchange.\n\nLCX Exchange expects the API Secret key, signature and timestamp in milliseconds to be included as headers in all API requests to the server, which looks like the following:\n\nx-access-timestamp - Current timestamp in milliseconds\nx-access-key - Your LCX Exchange API Key\nx-access-sign - Signature signed by your LCX Exchange Secret Key", "golang": "package main\n\nimport (\n\t\"bytes\"\n\t\"crypto/hmac\"\n\t\"crypto/sha256\"\n\t\"encoding/base64\"\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"io\"\n\t\"net/http\"\n\t\"strconv\"\n\t\"time\"\n)\n\nfunc main() {\n\tbaseUrl := \"https://exchange-api.lcx.com\"\n\tendpoint := \"/api/create\"\n\tmethod := \"POST\"\n\tapiKey := \"ADD YOUR LCX EXCHANGE API KEY\"\n\tsecretKey := \"ADD YOUR LCX EXCHANGE SECRET KEY\"\n\n\t// Create example payload\n\tpayload := map[string]interface{}{\n\t\t\"OrderType\": \"LIMIT\",\n\t\t\"Pair\":      \"LCX/ETH\",\n\t\t\"Side\":      \"BUY\",\n\t\t\"Price\":     0.03033486,\n\t\t\"Amount\":    500,\n\t}\n\n\tpayloadBytes, _ := json.Marshal(payload)\n\tpayloadString := string(payloadBytes)\n\n\t// Create request string\n\trequestString := method + endpoint + payloadString\n\n\t// Sign the request using HMAC-SHA256\n\tsignature := getSignature(requestString, secretKey)\n\n\t// Create HTTP request\n\turl := baseUrl + endpoint\n\treq, _ := http.NewRequest(method, url, bytes.NewBuffer(payloadBytes))\n\n\t// Add headers\n\treq.Header.Set(\"x-access-key\", apiKey)\n\treq.Header.Set(\"x-access-sign\", signature)\n\treq.Header.Set(\"x-access-timestamp\", strconv.FormatInt(time.Now().UnixNano()/1e6, 10))\n\treq.Header.Set(\"Content-Type\", \"application/json\")\n\n\t// Make the request\n\tclient := &http.Client{}\n\tresp, err := client.Do(req)\n\tif err != nil {\n\t\tfmt.Println(\"Error:\", err)\n\t\treturn\n\t}\n\tdefer resp.Body.Close()\n\n\tbody, _ := io.ReadAll(resp.Body)\n\tfmt.Println(\"Status:\", resp.StatusCode)\n\tfmt.Println(\"Body:\", string(body))\n}\n\nfunc getSignature(message string, secretKey string) string {\n\th := hmac.New(sha256.New, []byte(secretKey))\n\th.Write([]byte(message))\n\treturn base64.StdEncoding.EncodeToString(h.Sum(nil))\n}\n", "java": "import javax.crypto.Mac;\nimport javax.crypto.spec.SecretKeySpec;\nimport java.util.*;\nimport java.nio.charset.StandardCharsets;\nimport java.util.Base64;\nimport com.google.gson.Gson;\nimport com.google.gson.JsonObject;\nimport org.apache.http.client.methods.HttpPost;\nimport org.apache.http.entity.StringEntity;\nimport org.apache.http.impl.client.CloseableHttpClient;\nimport org.apache.http.impl.client.HttpClients;\n\npublic class LCXAuthentication {\n    public static void main(String[] args) throws Exception {\n        String baseUrl = \"https://exchange-api.lcx.com\";\n        String endpoint = \"/api/create\";\n        String method = \"POST\";\n        String apiKey = \"ADD YOUR LCX EXCHANGE API KEY\";\n        String secretKey = \"ADD YOUR LCX EXCHANGE SECRET KEY\";\n\n        // Create example payload\n        JsonObject payload = new JsonObject();\n        payload.addProperty(\"OrderType\", \"LIMIT\");\n        payload.addProperty(\"Pair\", \"LCX/ETH\");\n        payload.addProperty(\"Side\", \"BUY\");\n        payload.addProperty(\"Price\", 0.03033486);\n        payload.addProperty(\"Amount\", 500);\n\n        String payloadString = payload.toString();\n\n        // Create request string\n        String requestString = method + endpoint + payloadString;\n\n        // Sign the request using HMAC-SHA256\n        String signature = getSignature(requestString, secretKey);\n\n        // Create HTTP request\n        CloseableHttpClient httpClient = HttpClients.createDefault();\n        HttpPost httpPost = new HttpPost(baseUrl + endpoint);\n\n        // Add headers\n        httpPost.setHeader(\"x-access-key\", apiKey);\n        httpPost.setHeader(\"x-access-sign\", signature);\n        httpPost.setHeader(\"x-access-timestamp\", String.valueOf(System.currentTimeMillis()));\n        httpPost.setHeader(\"Content-Type\", \"application/json\");\n\n        // Add payload\n        httpPost.setEntity(new StringEntity(payloadString));\n\n        try {\n            var response = httpClient.execute(httpPost);\n            System.out.println(\"Status: \" + response.getStatusLine().getStatusCode());\n            System.out.println(\"Body: \" + response.getEntity());\n        } catch (Exception e) {\n            System.out.println(\"Error: \" + e.getMessage());\n        }\n    }\n\n    private static String getSignature(String message, String secretKey) throws Exception {\n        Mac sha256_HMAC = Mac.getInstance(\"HmacSHA256\");\n        SecretKeySpec secret_key = new SecretKeySpec(\n            secretKey.getBytes(StandardCharsets.UTF_8),\n            \"HmacSHA256\"\n        );\n        sha256_HMAC.init(secret_key);\n        byte[] hash = sha256_HMAC.doFinal(message.getBytes(StandardCharsets.UTF_8));\n        return Base64.getEncoder().encodeToString(hash);\n    }\n}\n", "javascript": "const CryptoJS = require('crypto-js')\nconst axios = require('axios')\nlet base_url = 'https://exchange-api.lcx.com'\nlet end_point = '/api/create'\nlet method = 'POST'\nlet api = 'ADD YOUR LCX EXCHANGE API KEY'\nlet secret = 'ADD YOUR LCX EXCHANGE SECRET KEY'\nconst EXAMPLE_PAYLOAD = {\n  OrderType: 'LIMIT',\n  Pair: 'LCX/ETH',\n  Side: 'BUY',\n  Price: 0.03033486,\n  Amount: 500,\n}\n// If No Payload, then it is important to pass empty object in EXAMPLE_PAYLOAD, ie. {}\n\nlet requestString = method + end_point + JSON.stringify(EXAMPLE_PAYLOAD)\nlet hash = CryptoJS.HmacSHA256(requestString, secret)\nlet signature = CryptoJS.enc.Base64.stringify(hash)\nlet headers = {\n  'x-access-key': api,\n  'x-access-sign': signature,\n  'x-access-timestamp': Date.now(),\n}\nlet url = base_url + end_point\naxios\n  .post(url, JSON.stringify(EXAMPLE_PAYLOAD), { headers: headers })\n  .then((result) => {\n    console.log(result)\n    // ... result\n  })\n  .catch((error) => {\n    console.log(error)\n    // ... error\n  })", "php": "<?php\n\n$baseUrl = 'https://exchange-api.lcx.com';\n$endpoint = '/api/create';\n$method = 'POST';\n$apiKey = 'ADD YOUR LCX EXCHANGE API KEY';\n$secretKey = 'ADD YOUR LCX EXCHANGE SECRET KEY';\n\n// Create example payload\n$payload = array(\n    'OrderType' => 'LIMIT',\n    'Pair' => 'LCX/ETH',\n    'Side' => 'BUY',\n    'Price' => 0.03033486,\n    'Amount' => 500,\n);\n\n$payloadString = json_encode($payload);\n\n// Create request string\n$requestString = $method . $endpoint . $payloadString;\n\n// Sign the request using HMAC-SHA256\n$signature = base64_encode(\n    hash_hmac('sha256', $requestString, $secretKey, true)\n);\n\n// Prepare headers\n$headers = array(\n    'x-access-key: ' . $apiKey,\n    'x-access-sign: ' . $signature,\n    'x-access-timestamp: ' . (time() * 1000),\n    'Content-Type: application/json',\n);\n\n// Create HTTP request using cURL\n$url = $baseUrl . $endpoint;\n$ch = curl_init($url);\n\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, $method);\ncurl_setopt($ch, CURLOPT_POSTFIELDS, $payloadString);\ncurl_setopt($ch, CURLOPT_HTTPHEADER, $headers);\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n\ntry {\n    $response = curl_exec($ch);\n    if ($response === false) {\n        echo \"cURL Error: \" . curl_error($ch) . \"\\n\";\n    } else {\n        echo \"Response: \" . $response . \"\\n\";\n    }\n} catch (Exception $e) {\n    echo \"Error: \" . $e->getMessage() . \"\\n\";\n} finally {\n    curl_close($ch);\n}\n\n?>\n", "python": "import requests\nimport hmac\nimport hashlib\nimport base64\nimport json\nimport time\n\nbase_url = 'https://exchange-api.lcx.com'\nend_point = '/api/create'\nmethod = 'POST'\napi_key = 'ADD YOUR LCX EXCHANGE API KEY'\nsecret_key = 'ADD YOUR LCX EXCHANGE SECRET KEY'\n\nexample_payload = {\n    'OrderType': 'LIMIT',\n    'Pair': 'LCX/ETH',\n    'Side': 'BUY',\n    'Price': 0.03033486,\n    'Amount': 500,\n}\n\n# Create request string\nrequest_string = method + end_point + json.dumps(example_payload)\n\n# Sign the request\nsignature = base64.b64encode(\n    hmac.new(\n        secret_key.encode(),\n        request_string.encode(),\n        hashlib.sha256\n    ).digest()\n).decode()\n\n# Prepare headers\nheaders = {\n    'x-access-key': api_key,\n    'x-access-sign': signature,\n    'x-access-timestamp': str(int(time.time() * 1000)),\n}\n\n# Make the request\nurl = base_url + end_point\ntry:\n    response = requests.post(url, json=example_payload, headers=headers)\n    print(response.json())\nexcept Exception as e:\n    print(f\"Error: {e}\")\n"}, "Balance": {"golang": "package main\n\nimport (\n  \"fmt\"\n  \"net/http\"\n)\n\nfunc main() {\n  url := \"https://exchange-api.lcx.com/api/balance\"\n  coin := \"ETH\"\n\n  resp, err := http.Get(url + \"?coin=\" + coin)\n  if err != nil {\n    fmt.Println(err)\n    return\n  }\n  defer resp.Body.Close()\n\n  fmt.Println(resp)\n}\n", "java": "import okhttp3.OkHttpClient;\nimport okhttp3.Request;\nimport okhttp3.Response;\n\nimport java.io.IOException;\n\npublic class Main {\n    public static void main(String[] args) throws IOException {\n        OkHttpClient client = new OkHttpClient();\n\n        String url = \"https://exchange-api.lcx.com/api/balance\";\n        String coin = \"ETH\";\n\n        Request request = new Request.Builder()\n                .url(url + \"?coin=\" + coin)\n                .get()\n                .addHeader(\"Content-Type\", \"application/json\")\n                // Add your authentication headers here\n                .build();\n\n        try (Response response = client.newCall(request).execute()) {\n            System.out.println(response.body().string());\n        }\n    }\n}\n", "javascript": "var axios = require(\"axios\");\nvar params = { coin: \"ETH\" };\n\nvar config = {\n  method: \"get\",\n  url: \"https://exchange-api.lcx.com/api/balance\",\n  headers: {\n    // auth headers\n  },\n  params,\n};\n\naxios(config)\n  .then(function (response) {\n    console.log(JSON.stringify(response.data));\n  })\n  .catch(function (error) {\n    console.log(error);\n  });\n", "php": "<?php\n\n$url = 'https://exchange-api.lcx.com/api/balance';\n$params = ['coin' => 'ETH'];\n$headers = [\n    'Content-Type: application/json',\n    // Add your authentication headers here\n];\n\n$ch = curl_init($url . '?' . http_build_query($params));\ncurl_setopt($ch, CURLOPT_HTTPHEADER, $headers);\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n\n$response = curl_exec($ch);\n\nif (curl_errno($ch)) {\n    echo 'Error: ' . curl_error($ch);\n}\n\ncurl_close($ch);\n\necho $response;\n?>\n", "python": "import requests\n\nurl = 'https://exchange-api.lcx.com/api/balance'\nparams = {'coin': 'ETH'}\nheaders = {\n    'Content-Type': 'application/json',\n    # Add your authentication headers here\n}\n\nresponse = requests.get(url, headers=headers, params=params)\nprint(response.json())\n"}, "Balances": {"golang": "package main\n\nimport (\n  \"fmt\"\n  \"net/http\"\n)\n\nfunc main() {\n  url := \"https://exchange-api.lcx.com/api/balances\"\n\n  req, err := http.NewRequest(\"GET\", url, nil)\n  if err != nil {\n    fmt.Println(err)\n    return\n  }\n  req.Header.Set(\"Content-Type\", \"application/json\")\n\n  // Add authentication headers here\n\n  client := &http.Client{}\n  resp, err := client.Do(req)\n  if err != nil {\n    fmt.Println(err)\n    return\n  }\n  defer resp.Body.Close()\n\nif resp.Status == \"200 OK\" {\n    // Read and print the response body\n    buf := new(bytes.Buffer)\n    buf.ReadFrom(resp.Body)\n    fmt.Println(buf.String())\n  } else {\n    fmt.Println(\"Error:\", resp.Status)\n  }\n}\n", "java": "import org.apache.http.HttpResponse;\nimport org.apache.http.client.methods.HttpGet;\nimport org.apache.http.impl.client.CloseableHttpClient;\nimport org.apache.http.impl.client.HttpClients;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\n\npublic class Main {\n    public static void main(String[] args) {\n        CloseableHttpClient httpClient = HttpClients.createDefault();\n        HttpGet httpGet = new HttpGet(\"https://exchange-api.lcx.com/api/balances\");\n\n        // Add authentication headers here\n\n        try {\n            HttpResponse response = httpClient.execute(httpGet);\n            BufferedReader rd = new BufferedReader(new InputStreamReader(response.getEntity().getContent()));\n\n            StringBuilder result = new StringBuilder();\n            String line;\n            while ((line = rd.readLine()) != null) {\n                result.append(line);\n            }\n\n            System.out.println(result.toString());\n        } catch (Exception e) {\n            e.printStackTrace();\n        }\n    }\n}\n", "javascript": "var axios = require('axios')\n\nvar config = {\n  method: 'get',\n  url: 'https://exchange-api.lcx.com/api/balances',\n  headers: {\n    // auth headers\n  },\n}\n\naxios(config)\n  .then(function (response) {\n    console.log(JSON.stringify(response.data))\n  })\n  .catch(function (error) {\n    console.log(error)\n  })\n", "php": "<?php\n\n$url = 'https://exchange-api.lcx.com/api/balances';\n\n$options = [\n    'http' => [\n        'header' => \"Content-Type: application/json\\r\\n\",\n        'method' => 'GET',\n    ],\n];\n\n// Add authentication headers here\n\n$context = stream_context_create($options);\n$response = file_get_contents($url, false, $context);\n\nif ($response !== false) {\n    echo $response;\n} else {\n    echo 'Error: ' . error_get_last();\n}\n", "python": "import requests\n\nurl = 'https://exchange-api.lcx.com/api/balances'\n\nheaders = {\n    'Content-Type': 'application/json',\n    # Add authentication headers here\n}\n\nresponse = requests.get(url, headers=headers)\n\nif response.status_code == 200:\n    print(js         function initTabs() {
            const container = document.getElementById('contentContainer');
            const tabsDiv = document.getElementById('endpointTabs');

            let firstEndpoint = true;

            Object.entries(endpoints).forEach(([endpointName, languages]) => {
                // Create endpoint tab
                const tab = document.createElement('button');
                tab.className = 'endpoint-tab' + (firstEndpoint ? ' active' : '');
                tab.textContent = endpointName;
                tab.onclick = () => switchEndpoint(endpointName);
                tabsDiv.appendChild(tab);

                // Create endpoint content
                const content = document.createElement('div');
                content.className = 'endpoint-content' + (firstEndpoint ? ' active' : '');
                content.id = 'endpoint-' + endpointName;

                const title = document.createElement('div');
                title.className = 'endpoint-title';
                title.textContent = endpointName;
                content.appendChild(title);

                // Language tabs
                const langTabs = document.createElement('div');
                langTabs.className = 'lang-tabs';

                let firstLang = true;
                Object.entries(languages).forEach(([lang, code]) => {
                    const langTab = document.createElement('button');
                    langTab.className = 'lang-tab' + (firstLang ? ' active' : '');
                    langTab.textContent = lang;
                    langTab.onclick = () => switchLanguage(endpointName, lang);
                    langTabs.appendChild(langTab);

                    const langContent = document.createElement('div');
                    langContent.className = 'lang-content' + (firstLang ? ' active' : '');
                    langContent.id = 'lang-' + endpointName + '-' + lang;

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-button';
                    copyBtn.textContent = '📋 Copy Code';
                    copyBtn.onclick = () => {
                        const codeText = document.querySelector('#lang-' + endpointName + '-' + lang + ' pre').textContent;
                        navigator.clipboard.writeText(codeText).then(() => {
                            alert('Code copied to clipboard!');
                        });
                    };
                    langContent.appendChild(copyBtn);

                    const pre = document.createElement('pre');
                    pre.textContent = code;
                    langContent.appendChild(pre);

                    content.appendChild(langContent);
                    firstLang = false;
                });

                content.insertBefore(langTabs, content.querySelector('.lang-tabs'));
                container.appendChild(content);
                firstEndpoint = false;
            });
        }

        function switchEndpoint(name) {
            // Hide all endpoints
            document.querySelectorAll('.endpoint-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.endpoint-tab').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected
            document.getElementById('endpoint-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        function switchLanguage(endpoint, lang) {
            const contentId = 'endpoint-' + endpoint;
            const container = document.getElementById(contentId);

            // Hide all languages in this endpoint
            container.querySelectorAll('.lang-content').forEach(el => {
                el.classList.remove('active');
            });
            container.querySelectorAll('.lang-tab').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected language
            document.getElementById('lang-' + endpoint + '-' + lang).classList.add('active');
            event.target.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', initTabs);
    </script>
